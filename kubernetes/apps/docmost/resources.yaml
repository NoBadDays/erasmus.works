apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: docmost-postgres-auth
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: docmost-postgres-auth
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/basic-auth
      data:
        username: docmost
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: docmost-postgres-password
        metadataPolicy: None
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: docmost-app-secrets
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: docmost-app-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        app-secret: "{{ .app_secret }}"
        database-url: postgresql://docmost:{{ .password }}@docmost-postgres-rw.apps.svc.cluster.local:5432/docmost?schema=public
        smtp-password: "{{ .smtp_password }}"
  data:
    - secretKey: app_secret
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: docmost-app-secret
        metadataPolicy: None
    - secretKey: password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: docmost-postgres-password
        metadataPolicy: None
    - secretKey: smtp_password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: smtp2go-password
        metadataPolicy: None
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: docmost-postgres
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  instances: 1
  storage:
    size: 10Gi
    storageClass: longhorn
  bootstrap:
    initdb:
      database: docmost
      owner: docmost
      secret:
        name: docmost-postgres-auth
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: docmost-data
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: docmost-redis-data
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docmost-redis
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docmost-redis
  template:
    metadata:
      labels:
        app: docmost-redis
    spec:
      containers:
        - name: redis
          image: redis:8-alpine
          args:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory-policy
            - noeviction
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: docmost-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: docmost-redis
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  selector:
    app: docmost-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docmost
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docmost
  template:
    metadata:
      labels:
        app: docmost
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z docmost-postgres-rw.apps.svc.cluster.local 5432; do sleep 2; done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z docmost-redis.apps.svc.cluster.local 6379; do sleep 2; done
      containers:
        - name: docmost
          image: docmost/docmost:0.70.1
          env:
            - name: APP_URL
              value: https://docmost.erasmus.works
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: docmost-app-secrets
                  key: app-secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: docmost-app-secrets
                  key: database-url
            - name: REDIS_URL
              value: redis://docmost-redis.apps.svc.cluster.local:6379
            - name: STORAGE_DRIVER
              value: local
            - name: MAIL_DRIVER
              value: smtp
            - name: SMTP_HOST
              value: mail-eu.smtp2go.com
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USERNAME
              value: erasmus.works
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: docmost-app-secrets
                  key: smtp-password
            - name: SMTP_SECURE
              value: "false"
            - name: SMTP_IGNORETLS
              value: "false"
            - name: MAIL_FROM_ADDRESS
              value: noreply@erasmus.works
            - name: MAIL_FROM_NAME
              value: Docmost
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: data
              mountPath: /app/data/storage
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: docmost-data
---
apiVersion: v1
kind: Service
metadata:
  name: docmost
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    app: docmost
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: docmost
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  parentRefs:
    - name: homelab
      namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - docmost.homelab
    - docmost.erasmus.works
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: docmost
          group: ""
          kind: Service
          port: 3000
          weight: 1
