apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: docmost-redis-data
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docmost-redis
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: docmost-redis
  template:
    metadata:
      labels:
        app: docmost-redis
    spec:
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: redis
          image: redis:8-alpine
          securityContext:
            runAsUser: 999
            runAsGroup: 999
          args:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory-policy
            - noeviction
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: docmost-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: docmost-redis
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  selector:
    app: docmost-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
