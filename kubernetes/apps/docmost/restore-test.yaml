apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: docmost-postgres-restore
  namespace: apps
spec:
  instances: 1
  storage:
    size: 10Gi
    storageClass: longhorn
  bootstrap:
    recovery:
      source: docmost-postgres
      database: docmost
      owner: docmost
      secret:
        name: docmost-postgres-auth
  externalClusters:
    - name: docmost-postgres
      barmanObjectStore:
        destinationPath: s3://cnpg-backups/docmost
        endpointURL: http://garage.garage.svc.cluster.local:3900
        serverName: docmost-postgres
        s3Credentials:
          accessKeyId:
            name: docmost-postgres-backup-s3
            key: ACCESS_KEY_ID
          secretAccessKey:
            name: docmost-postgres-backup-s3
            key: ACCESS_SECRET_KEY
        wal:
          compression: gzip
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docmost-restore-test
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docmost-restore-test
  template:
    metadata:
      labels:
        app: docmost-restore-test
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z docmost-postgres-restore-rw.apps.svc.cluster.local 5432; do sleep 2; done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z docmost-redis.apps.svc.cluster.local 6379; do sleep 2; done
      containers:
        - name: docmost
          image: docmost/docmost:0.70.1
          env:
            - name: APP_URL
              value: http://docmost-restore-test.apps.svc.cluster.local:3000
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: docmost-app-secrets
                  key: app-secret
            - name: DATABASE_URL
              value: postgresql://docmost:$(POSTGRES_PASSWORD)@docmost-postgres-restore-rw.apps.svc.cluster.local:5432/docmost?schema=public
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: docmost-postgres-auth
                  key: password
            - name: REDIS_URL
              value: redis://docmost-redis.apps.svc.cluster.local:6379
            - name: STORAGE_DRIVER
              value: local
            - name: MAIL_DRIVER
              value: smtp
            - name: SMTP_HOST
              value: mail-eu.smtp2go.com
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USERNAME
              value: erasmus.works
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: docmost-app-secrets
                  key: smtp-password
            - name: SMTP_SECURE
              value: "false"
            - name: SMTP_FROM_ADDRESS
              value: notifications@erasmus.works
            - name: SMTP_FROM_NAME
              value: Docmost Restore Test
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /app/data/storage
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: docmost-data-restore
---
apiVersion: v1
kind: Service
metadata:
  name: docmost-restore-test
  namespace: apps
spec:
  selector:
    app: docmost-restore-test
  ports:
    - name: http
      port: 3000
      targetPort: http
