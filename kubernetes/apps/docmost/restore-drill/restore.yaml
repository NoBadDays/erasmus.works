# Temporary restore drill resources for Docmost.
# This file is kept in git but is not deployed by default.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: docmost-data-restore
  namespace: app-docmost
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: docmost-data-restore
  namespace: app-docmost
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  trigger:
    # Change this to any new value to trigger another restore run.
    manual: ""
  restic:
    repository: docmost-data-restic-config
    destinationPVC: docmost-data-restore
    copyMethod: Direct
    moverVolumes:
      - mountPath: /mnt/repo
        volumeSource:
          persistentVolumeClaim:
            claimName: volsync-repository
