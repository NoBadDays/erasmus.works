apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      initContainers:
        - name: init-config
          image: busybox:1.37
          command:
            - sh
            - -c
            - mkdir -p /app/config/logs && ln -sf /config-src/settings.yaml /app/config/settings.yaml && ln -sf /config-src/services.yaml /app/config/services.yaml
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: config-src
              mountPath: /config-src
              readOnly: true
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:v1.12.1
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: home.homelab,home.erasmus.works
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: config-src
              mountPath: /config-src
              readOnly: true
      volumes:
        - name: config
          emptyDir: {}
        - name: config-src
          configMap:
            name: homepage-config
---
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: apps
spec:
  selector:
    app: homepage
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homepage
  namespace: apps
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  parentRefs:
    - name: homelab
      namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - home.homelab
    - home.erasmus.works
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: homepage
          group: ""
          kind: Service
          port: 3000
          weight: 1
