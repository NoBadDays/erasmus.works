apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-postgres-auth
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: immich-postgres-auth
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: kubernetes.io/basic-auth
      data:
        username: immich
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: immich-postgres-password
        metadataPolicy: None
        nullBytePolicy: Ignore
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-app-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: immich-app-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: Opaque
      data:
        DB_URL: postgresql://immich:{{ .password }}@immich-postgres-rw.app-immich.svc.cluster.local:5432/immich
  data:
    - secretKey: password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: immich-postgres-password
        metadataPolicy: None
        nullBytePolicy: Ignore
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-postgres-backup-s3
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: immich-postgres-backup-s3
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: Opaque
      data:
        # Match the existing nextcloud/docmost pattern:
        # keep the non-secret access key ID in Git, keep only the secret key in Bitwarden.
        ACCESS_KEY_ID: "GKb6cf9dc1807b170578c11a8a"
        ACCESS_SECRET_KEY: "{{ .access_secret_key }}"
  data:
    - secretKey: access_secret_key
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: immich-cnpg-backup-secret-access-key
        metadataPolicy: None
        nullBytePolicy: Ignore
