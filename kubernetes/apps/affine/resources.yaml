apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: affine-postgres-auth
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: affine-postgres-auth
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/basic-auth
      data:
        username: affine
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: affine-postgres-password
        metadataPolicy: None
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: affine-app-secrets
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: affine-app-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        database-url: postgresql://affine:{{ .password }}@affine-postgres-rw.apps.svc.cluster.local:5432/affine
  data:
    - secretKey: password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: affine-postgres-password
        metadataPolicy: None
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: affine-postgres
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  instances: 1
  storage:
    size: 10Gi
    storageClass: longhorn
  bootstrap:
    initdb:
      database: affine
      owner: affine
      secret:
        name: affine-postgres-auth
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: affine-data
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: affine-redis
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: affine-redis
  template:
    metadata:
      labels:
        app: affine-redis
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          args:
            - --save
            - ""
            - --appendonly
            - "no"
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: affine-redis
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  selector:
    app: affine-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: affine
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: affine
  template:
    metadata:
      labels:
        app: affine
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z affine-postgres-rw.apps.svc.cluster.local 5432; do sleep 2; done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z affine-redis.apps.svc.cluster.local 6379; do sleep 2; done
        - name: affine-predeploy
          image: ghcr.io/toeverything/affine:0.26.4
          command:
            - sh
            - -c
            - node ./scripts/self-host-predeploy.js
          env:
            - name: AFFINE_SERVER_HOST
              value: affine.erasmus.works
            - name: AFFINE_SERVER_EXTERNAL_URL
              value: https://affine.erasmus.works
            - name: AFFINE_SERVER_HTTPS
              value: "true"
            - name: REDIS_SERVER_HOST
              value: affine-redis.apps.svc.cluster.local
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: affine-app-secrets
                  key: database-url
            - name: AFFINE_INDEXER_ENABLED
              value: "false"
          volumeMounts:
            - name: data
              mountPath: /root/.affine
      containers:
        - name: affine
          image: ghcr.io/toeverything/affine:0.26.4
          env:
            - name: AFFINE_SERVER_HOST
              value: affine.erasmus.works
            - name: AFFINE_SERVER_EXTERNAL_URL
              value: https://affine.erasmus.works
            - name: AFFINE_SERVER_HTTPS
              value: "true"
            - name: REDIS_SERVER_HOST
              value: affine-redis.apps.svc.cluster.local
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: affine-app-secrets
                  key: database-url
            - name: AFFINE_INDEXER_ENABLED
              value: "false"
          ports:
            - name: http
              containerPort: 3010
          volumeMounts:
            - name: data
              mountPath: /root/.affine
          readinessProbe:
            httpGet:
              path: /info
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /info
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: affine-data
---
apiVersion: v1
kind: Service
metadata:
  name: affine
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    app: affine
  ports:
    - name: http
      port: 3010
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: affine
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  parentRefs:
    - name: homelab
      namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - affine.homelab
    - affine.erasmus.works
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: affine
          group: ""
          kind: Service
          port: 3010
          weight: 1
