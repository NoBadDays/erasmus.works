apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "9"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: apps
  source:
    repoURL: https://github.com/ErasmusAndre/erasmus.works.git
    targetRevision: main
    path: kubernetes/apps/immich
  destination:
    server: https://kubernetes.default.svc
    namespace: app-immich
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
