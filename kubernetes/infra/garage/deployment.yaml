apiVersion: apps/v1
kind: Deployment
metadata:
  name: garage
  namespace: garage
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: garage
  template:
    metadata:
      labels:
        app: garage
    spec:
      initContainers:
        - name: init-storage
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /var/lib/garage/data /var/lib/garage/meta
          volumeMounts:
            - name: storage
              mountPath: /var/lib/garage
      containers:
        - name: garage
          image: dxflrs/garage:v2.2.0@sha256:45a61ce3f7c9c24fc23d9ed2b09b27ed560ab87b34605d175d5c588f539c24e4
          args:
            - server
            - --single-node
          envFrom:
            - secretRef:
                name: garage-secrets
          ports:
            - name: s3
              containerPort: 3900
            - name: rpc
              containerPort: 3901
            - name: admin
              containerPort: 3903
          readinessProbe:
            tcpSocket:
              port: s3
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: s3
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /etc/garage.toml
              subPath: garage.toml
              readOnly: true
            - name: storage
              mountPath: /var/lib/garage
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: garage-config
        - name: storage
          nfs:
            server: 192.168.20.40
            path: /mnt/tank/k8s-garage
        - name: tmp
          emptyDir: {}
