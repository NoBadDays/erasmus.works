apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: volume-snapshots
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  sources:
    - repoURL: https://piraeus.io/helm-charts/
      chart: snapshot-controller
      targetRevision: 5.0.3
      helm:
        releaseName: snapshot-controller
        valueFiles:
          - $values/kubernetes/infra/volume-snapshots/values.yaml
    - repoURL: https://github.com/NoBadDays/erasmus.works.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  ignoreDifferences:
    - kind: Secret
      name: snapshot-controller-conversion-webhook
      namespace: kube-system
      jsonPointers:
        - /data
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: volumegroupsnapshotcontents.groupsnapshot.storage.k8s.io
      jsonPointers:
        - /spec/conversion/webhook/clientConfig/caBundle
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
