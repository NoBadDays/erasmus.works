apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: volsync
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  sources:
    - repoURL: https://backube.github.io/helm-charts/
      chart: volsync
      targetRevision: 0.15.0
      helm:
        releaseName: volsync
        valueFiles:
          - $values/kubernetes/infra/volsync/values.yaml
    - repoURL: https://github.com/NoBadDays/erasmus.works.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: volsync-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
