apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: authentik
  namespace: apps
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: authentik
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
          podSelector:
            matchLabels:
              app.kubernetes.io/component: proxy
              app.kubernetes.io/name: envoy
      ports:
        - port: 9000
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9300
          protocol: TCP
