apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-postgres
  namespace: authentik
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  instances: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  monitoring:
    enablePodMonitor: true
  storage:
    size: 10Gi
    storageClass: longhorn
  backup:
    barmanObjectStore:
      destinationPath: s3://cnpg-authentik
      endpointURL: http://garage.garage.svc.cluster.local:3900
      serverName: authentik-postgres
      s3Credentials:
        accessKeyId:
          name: authentik-postgres-backup-s3
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: authentik-postgres-backup-s3
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
    retentionPolicy: "30d"
  bootstrap:
    recovery:
      source: authentik-postgres
      database: authentik
      owner: authentik
      secret:
        name: authentik-postgres-auth
  externalClusters:
    - name: authentik-postgres
      barmanObjectStore:
        destinationPath: s3://cnpg-authentik
        endpointURL: http://garage.garage.svc.cluster.local:3900
        serverName: authentik-postgres
        s3Credentials:
          accessKeyId:
            name: authentik-postgres-backup-s3
            key: ACCESS_KEY_ID
          secretAccessKey:
            name: authentik-postgres-backup-s3
            key: ACCESS_SECRET_KEY
        wal:
          compression: gzip
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: authentik-postgres-backup
  namespace: authentik
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  schedule: "0 10 3 * * *" # every day at 3:10am
  immediate: true
  backupOwnerReference: cluster
  cluster:
    name: authentik-postgres
