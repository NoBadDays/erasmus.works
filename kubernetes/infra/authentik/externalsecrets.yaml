apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-postgres-auth
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: authentik-postgres-auth
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/basic-auth
      data:
        username: authentik
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: authentik-postgres-password
        metadataPolicy: None
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-env
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: authentik-env
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        AUTHENTIK_SECRET_KEY: "{{ .secret_key }}"
        AUTHENTIK_POSTGRESQL__HOST: authentik-postgres-rw.apps.svc.cluster.local
        AUTHENTIK_POSTGRESQL__NAME: authentik
        AUTHENTIK_POSTGRESQL__PORT: "5432"
        AUTHENTIK_POSTGRESQL__USER: authentik
        AUTHENTIK_POSTGRESQL__PASSWORD: "{{ .postgres_password }}"
        AUTHENTIK_POSTGRESQL__SSLMODE: disable
        AUTHENTIK_STORAGE__BACKEND: file
        AUTHENTIK_STORAGE__FILE__PATH: /data
        AUTHENTIK_EMAIL__HOST: mail-eu.smtp2go.com
        AUTHENTIK_EMAIL__PORT: "587"
        AUTHENTIK_EMAIL__USERNAME: erasmus.works
        AUTHENTIK_EMAIL__PASSWORD: "{{ .smtp_password }}"
        AUTHENTIK_EMAIL__USE_TLS: "true"
        AUTHENTIK_EMAIL__FROM: "authentik <notifications@erasmus.works>"
        AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
        ARGOCD_OAUTH2_CLIENT_SECRET: "{{ .argocd_oauth2_client_secret }}"
        IMMICH_OAUTH2_CLIENT_SECRET: "{{ .immich_oauth2_client_secret }}"
        NEXTCLOUD_OAUTH2_CLIENT_SECRET: "{{ .nextcloud_oauth2_client_secret }}"
  data:
    - secretKey: secret_key
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: authentik-secret-key
        metadataPolicy: None
    - secretKey: postgres_password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: authentik-postgres-password
        metadataPolicy: None
    - secretKey: smtp_password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: smtp2go-password
        metadataPolicy: None
    - secretKey: argocd_oauth2_client_secret
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: argocd-oauth2-client-secret
        metadataPolicy: None
    - secretKey: immich_oauth2_client_secret
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: immich-oauth2-client-secret
        metadataPolicy: None
    - secretKey: nextcloud_oauth2_client_secret
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: nextcloud-oauth2-client-secret
        metadataPolicy: None
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-postgres-backup-s3
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: authentik-postgres-backup-s3
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        # Keep the non-secret access key ID in Git and the secret key in Bitwarden.
        ACCESS_KEY_ID: "GK22dd8d1fe0083205e082a2a2"
        ACCESS_SECRET_KEY: "{{ .access_secret_key }}"
  data:
    - secretKey: access_secret_key
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: authentik-cnpg-backup-secret-access-key
        metadataPolicy: None
