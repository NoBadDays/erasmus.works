apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-state-metrics-volsync
rules:
  - apiGroups:
      - volsync.backube
    resources:
      - replicationsources
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-state-metrics-volsync
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-state-metrics-volsync
subjects:
  - kind: ServiceAccount
    name: kube-prometheus-stack-kube-state-metrics
    namespace: monitoring
