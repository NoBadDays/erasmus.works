prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kube-state-metrics:
  customResourceState:
    enabled: true
    config:
      kind: CustomResourceStateMetrics
      spec:
        resources:
          - groupVersionKind:
              group: volsync.backube
              version: v1alpha1
              kind: ReplicationSource
            metricNamePrefix: volsync
            labelsFromPath:
              obj_name:
                - metadata
                - name
              obj_namespace:
                - metadata
                - namespace
            metrics:
              - name: replicationsource_info
                help: VolSync ReplicationSource status
                each:
                  type: Info
                  info:
                    labelsFromPath:
                      source_pvc:
                        - spec
                        - sourcePVC
                      last_sync_time:
                        - status
                        - lastSyncTime
                      last_sync_duration:
                        - status
                        - lastSyncDuration
                      next_sync_time:
                        - status
                        - nextSyncTime
                      latest_result:
                        - status
                        - latestMoverStatus
                        - result
grafana:
  admin:
    existingSecret: kube-prometheus-stack-grafana
    userKey: admin-user
    passwordKey: admin-password
  envFromSecret: grafana-oauth-credentials
  grafana.ini:
    server:
      domain: grafana.erasmus.works
      root_url: https://grafana.erasmus.works
    auth.generic_oauth:
      enabled: true
      name: Authentik
      allow_sign_up: true
      client_id: grafana-erasmus-works
      scopes: openid profile email
      auth_url: https://authentik.erasmus.works/application/o/authorize/
      token_url: https://authentik.erasmus.works/application/o/token/
      api_url: https://authentik.erasmus.works/application/o/userinfo/
  plugins:
    - victoriametrics-logs-datasource@0.26.3
  persistence:
    enabled: true
    type: pvc
    storageClassName: longhorn
    accessModes:
      - ReadWriteOnce
    size: 5Gi
