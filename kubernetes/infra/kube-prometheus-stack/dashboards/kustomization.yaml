apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: kube-prometheus-stack

configMapGenerator:
  - name: grafana-dashboard-kubernetes-dashboard
    files:
      - kubernetes-dashboard.json
  - name: grafana-dashboard-kubernetes-ram-cpu-utilization
    files:
      - kubernetes-ram-cpu-utilization.json
  - name: grafana-dashboard-longhorn-dashboard
    files:
      - longhorn-dashboard.json
  - name: grafana-dashboard-node-exporter-full
    files:
      - node-exporter-full.json
  - name: grafana-dashboard-argocd-operational-overview
    files:
      - argocd-operational-overview.json
