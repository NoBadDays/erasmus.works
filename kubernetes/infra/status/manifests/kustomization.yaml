apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - kromgo-deployment.yaml
  - kromgo-service.yaml
  - kromgo-httproute.yaml
  - kromgo-backendtrafficpolicy.yaml
  - gatus-deployment.yaml
  - gatus-service.yaml
  - gatus-httproute.yaml
  - gatus-backendtrafficpolicy.yaml
configMapGenerator:
  - name: kromgo-config
    files:
      - config.yaml=kromgo-config.yaml
  - name: gatus-config
    files:
      - config.yaml=gatus-config.yaml
