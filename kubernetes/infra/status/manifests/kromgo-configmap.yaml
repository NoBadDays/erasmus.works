apiVersion: v1
kind: ConfigMap
metadata:
  name: kromgo-config
data:
  config.yaml: |
    badge:
      font: Verdana.ttf
      size: 12
    metrics:
      - name: talos_version
        hidden: false
        query: "count by (os_image) (kube_node_info)"
        label: os_image
        title: Talos
      - name: kubernetes_version
        hidden: false
        query: "kubernetes_build_info{service=\"kubernetes\"}"
        label: git_version
        title: Kubernetes
      - name: cluster_node_count
        hidden: false
        query: "count(kube_node_info)"
        colors:
          - color: "green"
            min: 0
            max: 9999
        title: Nodes
      - name: cluster_pod_count
        hidden: false
        query: "sum(kube_pod_status_phase{phase=\"Running\"})"
        colors:
          - color: "green"
            min: 0
            max: 9999
        title: Pods
      - name: cluster_cpu_usage
        hidden: false
        query: "round((1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))) * 100, 0.1)"
        suffix: "%"
        colors:
          - color: "green"
            min: 0
            max: 35
          - color: "orange"
            min: 35
            max: 75
          - color: "red"
            min: 75
            max: 100
        title: CPU
      - name: cluster_memory_usage
        hidden: false
        query: "round((1 - (sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes))) * 100, 0.1)"
        suffix: "%"
        colors:
          - color: "green"
            min: 0
            max: 50
          - color: "orange"
            min: 50
            max: 80
          - color: "red"
            min: 80
            max: 100
        title: Memory
      - name: cluster_age_days
        hidden: false
        query: "round((time() - min(kube_node_created)) / 86400)"
        suffix: "d"
        colors:
          - color: "green"
            min: 0
            max: 180
          - color: "orange"
            min: 181
            max: 360
          - color: "red"
            min: 361
            max: 1000
        title: Age
      - name: cluster_uptime_days
        hidden: false
        query: "round(avg(node_time_seconds - node_boot_time_seconds) / 86400)"
        suffix: "d"
        colors:
          - color: "green"
            min: 0
            max: 180
          - color: "orange"
            min: 181
            max: 360
          - color: "red"
            min: 361
            max: 1000
        title: Uptime
      - name: cluster_alert_count
        hidden: false
        query: "count(ALERTS{alertstate=\"firing\",alertname!=\"Watchdog\",alertname!=\"InfoInhibitor\"}) or vector(0)"
        colors:
          - color: "green"
            min: 0
            max: 0
          - color: "red"
            min: 1
            max: 1000
        title: Alerts
