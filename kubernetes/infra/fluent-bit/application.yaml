apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluent-bit
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  source:
    repoURL: https://fluent.github.io/helm-charts
    chart: fluent-bit
    targetRevision: 0.56.0
    helm:
      releaseName: fluent-bit
      values: |
        kind: DaemonSet

        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi

        daemonSetVolumes:
          - name: varlog
            hostPath:
              path: /var/log

        daemonSetVolumeMounts:
          - name: varlog
            mountPath: /var/log
            readOnly: true

        config:
          service: |
            [SERVICE]
                Daemon Off
                Flush {{ .Values.flush }}
                Log_Level {{ .Values.logLevel }}
                Parsers_File /fluent-bit/etc/parsers.conf
                Parsers_File /fluent-bit/etc/conf/custom_parsers.conf
                HTTP_Server On
                HTTP_Listen 0.0.0.0
                HTTP_Port {{ .Values.metricsPort }}
                Health_Check On

          inputs: |
            [INPUT]
                Name tail
                Path /var/log/containers/*.log
                multiline.parser docker, cri
                Tag kube.*
                Mem_Buf_Limit 10MB
                Skip_Long_Lines On

          filters: |
            [FILTER]
                Name kubernetes
                Match kube.*
                Buffer_Size 0
                Kube_Tag_Prefix kube.var.log.containers.
                Labels Off
                Annotations Off
                Merge_Log Off
                K8S-Logging.Parser On
                K8S-Logging.Exclude On

          outputs: |
            [OUTPUT]
                Name http
                Match kube.*
                Host victorialogs.monitoring.svc.cluster.local
                Port 9428
                URI /insert/jsonline?_stream_fields=stream,kubernetes.namespace_name,kubernetes.pod_name,kubernetes.container_name&_msg_field=log&_time_field=date
                Format json_lines
                Json_date_key date
                Json_date_format iso8601
                Compress gzip
                Retry_Limit False
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
