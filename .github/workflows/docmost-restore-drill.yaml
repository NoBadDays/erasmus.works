name: Docmost Restore Drill

on:
  push:
    branches:
      - main
    paths:
      - kubernetes/apps/docmost/restore-drill/request.yaml
  workflow_dispatch:
    inputs:
      state:
        description: Requested restore drill transition
        required: true
        type: choice
        options:
          - start
          - cleanup
      note:
        description: Optional note stored in request.yaml and commit message
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: docmost-restore-drill
  cancel-in-progress: false

jobs:
  request:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.WORKFLOW_PUSH_TOKEN }}

      - name: Write Requested State
        id: request
        shell: bash
        run: |
          set -euo pipefail

          request_file="kubernetes/apps/docmost/restore-drill/request.yaml"
          state="${{ github.event.inputs.state }}"
          note="${{ github.event.inputs.note }}"

          case "$state" in
            start|cleanup) ;;
            *)
              echo "Unsupported dispatch state: $state" >&2
              exit 1
              ;;
          esac

          escaped_note="${note//\\/\\\\}"
          escaped_note="${escaped_note//\"/\\\"}"
          printf 'state: %s\nnote: "%s"\n' "$state" "$escaped_note" > "$request_file"

          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

          if [[ -n "$note" ]]; then
            echo "commit_message=Docmost restore drill: request $state [$note]" >> "$GITHUB_OUTPUT"
          else
            echo "commit_message=Docmost restore drill: request $state" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit And Push Request
        if: steps.request.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kubernetes/apps/docmost/restore-drill/request.yaml
          git commit -m "${{ steps.request.outputs.commit_message }}"
          git push

  process:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Process Restore Drill State
        id: process
        shell: bash
        run: |
          set -euo pipefail

          request_file="kubernetes/apps/docmost/restore-drill/request.yaml"
          kustomization_file="kubernetes/apps/docmost/kustomization.yaml"
          restore_file="kubernetes/apps/docmost/restore-drill/restore.yaml"
          restore_entry="  - restore-drill"

          state="$(sed -n 's/^state:[[:space:]]*//p' "$request_file" | head -n1 | xargs)"
          note="$(sed -n 's/^note:[[:space:]]*//p' "$request_file" | head -n1)"
          note="${note#\"}"
          note="${note%\"}"

          case "$state" in
            idle|start|started|cleanup) ;;
            *)
              echo "Unsupported state: $state" >&2
              exit 1
              ;;
          esac

          if [[ "$state" == "idle" || "$state" == "started" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "commit_message=Docmost restore drill: state already settled" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$state" == "start" ]]; then
            if ! grep -Fxq "$restore_entry" "$kustomization_file"; then
              printf '%s\n' "$restore_entry" >> "$kustomization_file"
            fi

            trigger_value="restore-$(date -u +%Y%m%dT%H%M%SZ)"
            sed -i "s|^\([[:space:]]*manual:\).*|\1 $trigger_value|" "$restore_file"
            summary="start $trigger_value"
            next_state="started"
          else
            temp_file="$(mktemp)"
            grep -Fvx "$restore_entry" "$kustomization_file" > "$temp_file" || true
            mv "$temp_file" "$kustomization_file"
            summary="cleanup"
            next_state="idle"
          fi

          escaped_note="${note//\\/\\\\}"
          escaped_note="${escaped_note//\"/\\\"}"
          printf 'state: %s\nnote: "%s"\n' "$next_state" "$escaped_note" > "$request_file"

          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

          if [[ -n "$note" ]]; then
            echo "commit_message=Docmost restore drill: $summary [$note]" >> "$GITHUB_OUTPUT"
          else
            echo "commit_message=Docmost restore drill: $summary" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit And Push Generated Changes
        if: steps.process.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kubernetes/apps/docmost/kustomization.yaml
          git add kubernetes/apps/docmost/restore-drill/restore.yaml
          git add kubernetes/apps/docmost/restore-drill/request.yaml
          git commit -m "${{ steps.process.outputs.commit_message }}"
          git push
